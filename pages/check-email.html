<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/check-email.css">
    <title>Email Check</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="../assets/images/Untitled/img/Left Side_ Branding/Background.jpg" alt="Branding Background">
        </div>

        <div class="right">
            <div class="main-content">
                <div class="icon-box">
                    <img src="../assets/icons and buttons/Untitled (4)/Untitled (5)/Icon/Overlay.svg" alt="Email Icon">
                </div>

                <h1>Check your email</h1>
                
                <p class="p-1">We've sent a password reset link to your registered email address. Please follow the instructions to secure your account.</p>

                <button><a href="login2.html">Return to login</a></button>

                <div class="resend-container">
                    <small>Didn't receive the email?</small>
                    <p class="p-2"><span>&#8635;</span> Resend verification link</p>
                </div>

                <p class="back-to-help">
                    <a href="#">&#8592; Back to help center</a>
                </p>
            </div>

            <footer>
                <div class="l"></div>
                <div class="footer-bottom">
                    <h3>SELLER PORTAL</h3>
                    <p>&copy; 2024 Odeshie Global</p>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
