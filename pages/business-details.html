<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Details — ODESHIE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-setup">
  <header class="setup-header">
    <a href="../index.html" class="setup-header__logo">
      <img src="../assets/logo-odeshie.png" alt="" class="setup-header__logo-img" width="40" height="40">
      <span class="setup-header__logo-text">ODESHIE</span>
    </a>
    <a href="../index.html" class="setup-header__close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
  </header>

  <main class="setup-main">
    <div class="setup-progress">
      <span class="setup-progress__step">STEP 3 OF 4</span>
      <h1 class="setup-progress__title">Business Details</h1>
      <div class="setup-progress__bar-wrap">
        <div class="setup-progress__bar" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="width: 75%"></div>
      </div>
      <span class="setup-progress__pct">75% Complete</span>
    </div>

    <div class="setup-card">
      <section class="setup-section">
        <h2 class="setup-section__heading">Business Information</h2>
        <p class="setup-section__sub">Please provide your official business details and payout preferences for secure earnings transfer.</p>
        <form class="setup-form" action="#" method="post">
          <div class="setup-field">
            <label class="setup-field__label" for="legal_name">Legal business name</label>
            <input type="text" name="legal_name" id="legal_name" class="setup-input setup-input--full" placeholder="Registered business or legal name">
          </div>
          <div class="setup-field">
            <label class="setup-field__label" for="business_address">Business address</label>
            <input type="text" name="business_address" id="business_address" class="setup-input setup-input--full" placeholder="Street address, City, State, ZIP">
          </div>
        </section>

        <section class="setup-section setup-section--payout">
        <button type="button" class="setup-section__toggle" aria-expanded="true" aria-controls="payout-fields" id="payout-toggle">
          <svg class="setup-section__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span class="setup-section__heading setup-section__heading--inline">Payout Information</span>
          <svg class="setup-section__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="payout-fields" class="setup-section__content">
          <div class="setup-field">
            <label class="setup-field__label" for="bank_name">Bank name</label>
            <div class="setup-input-wrap setup-input-wrap--secure">
              <input type="text" name="bank_name" id="bank_name" class="setup-input" placeholder="e.g. Standard Chartered Bank">
              <svg class="setup-input-wrap__lock" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
          </div>
          <div class="setup-field">
            <label class="setup-field__label" for="account_holder">Account holder name</label>
            <div class="setup-input-wrap setup-input-wrap--secure">
              <input type="text" name="account_holder" id="account_holder" class="setup-input" placeholder="Name as it appears on bank account">
              <svg class="setup-input-wrap__lock" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
          </div>
          <div class="setup-field">
            <label class="setup-field__label" for="account_number">Account number</label>
            <div class="setup-input-wrap setup-input-wrap--secure">
              <input type="text" name="account_number" id="account_number" class="setup-input" placeholder="Enter your bank account number" inputmode="numeric" autocomplete="off">
              <svg class="setup-input-wrap__lock" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
          </div>
        </div>
        </section>

        <div class="setup-actions">
          <button type="submit" class="setup-btn setup-btn--primary">Continue to Final Step →</button>
          <p class="setup-secure-msg">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Your financial data is encrypted and securely processed.
          </p>
        </div>
        </form>
    </div>
  </main>

  <footer class="setup-footer">
    <span class="setup-footer__item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secure Registration
    </span>
    <span class="setup-footer__item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Support
    </span>
  </footer>
</body>
</html>
